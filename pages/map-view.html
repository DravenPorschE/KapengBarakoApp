<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/map-view.css?v=2">
    <title>Document</title>
</head>
<body>
    <nav id="navigation-bar">
        <a class="back-btn" href="#" onclick="history.back(); return false;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Back
        </a>
        <button class="home-button" onclick='window.location.href="/pages/home.html"'>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8cfa0"><path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/></svg>
            </button>
        <div class="nav-divider"></div>
        <img class="nav-logo" src="/assets/icons/cityhall_logo.png" alt="Lipa City Hall Logo" onerror="this.style.display='none'">
        <div class="nav-title-block">
            <span class="nav-eyebrow">City of Lipa</span>
            <span class="nav-title">THE MAP OF LIPA CITY HALL</span>
        </div>
    </nav>

    <main class="main-content">
        <div class="map-view-container">
            <div class="map-floor-info-and-search-container">
                <p id="floor-display">First Floor</p>
                <div class="search-map-container">
                    <input class="search-input" type="text" list="offices" placeholder="City Civil Registrar's Office">
                    <button class="search-button">Find</button>

                    <datalist id="offices">
                        <option value="Business One Stop Shop"></option>
                        <option value="Lipa City Cooperatives Office"></option>
                        <option value="Lipa City Civil Registrar's Office"></option>
                        <option value="Lipa City Assessor's Office"></option>
                        <option value="Lipa City Treasurer's Office"></option>
                        <option value="Lipa City Personnel Office"></option>
                        <option value="Lipa City Cooperatives Office"></option>
                        <option value="Lipa City Accounting Office"></option>
                        <option value="Lipa City Legal Office"></option>
                        <option value="Commission On Audit"></option>
                        <option value="Lipa City Budget Office"></option>
                        <option value="Administrative Division"></option>
                        <option value="Lipa City Permits and Licensing Office"></option>
                        <option value="Business One Stop Shop (BOSS)"></option>
                        <option value="Lipa City Community Affairs Office"></option>
                        <option value="Lipa City Planning and Development Office"></option>
                        <option value="Office of the Congressman"></option>
                        <option value="Lipa City Mayor's Office"></option>
                        <option value="Lipa City Administrator's Office"></option>
                        <option value="Office of the Sangguniang Panglungsod"></option>
                        <option value="Lipa City Vice Mayor's Office"></option>
                        <option value="IT Department"></option>
                    </datalist>
                </div>
            </div>

            <div class="map-view">
                <div id="map" class="map-size"></div>

                <div class="map-controls-container">
                    <button class="zoom-in">+</button>
                    <button class="zoom-out">−</button>
                    <button class="floor-up" style="font-size: 20px;">Floor Up</button>
                    <button class="floor-down" style="font-size: 20px;">Floor Down</button>
                     <!-- <p id="floor-display">First Floor</p> -->
              </div>
            </div>

            <div class="map-information-container">
                <h2 class="map-department-name">Department Name</h2>

                <div class="map-info">
                    <div class="map-info-row">
                        <p class="map-info-label">Floor Location</p>
                        <p id="floor-location" class="map-info-data no-data">No Data</p>
                    </div>

                     <!-- <div class="map-info-row">
                        <p class="map-info-label">Total Services Offered</p>
                        <p id="services-offered" class="map-info-data no-data">No Data</p>
                     </div> -->

                     <ul class="services-list"></ul>
                </div>
            </div>

        </div>
    </main>

    <div class="main-keyboard-container">
        <div class="keyboard-container">
            <!-- Row 1 -->
            <div class="keyboard-container">

                <span class="keyboard-rows">
                    <button class="keyboard-keys">q</button>
                    <button class="keyboard-keys">w</button>
                    <button class="keyboard-keys">e</button>
                    <button class="keyboard-keys">r</button>
                    <button class="keyboard-keys">t</button>
                    <button class="keyboard-keys">y</button>
                    <button class="keyboard-keys">u</button>
                    <button class="keyboard-keys">i</button>
                    <button class="keyboard-keys">o</button>
                    <button class="keyboard-keys">p</button>
                    <button class="keyboard-keys action-keys">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="#c8a96e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
                            <line x1="18" y1="9" x2="12" y2="15"/>
                            <line x1="12" y1="9" x2="18" y2="15"/>
                        </svg>
                        Del
                    </button>
                </span>

                <span class="keyboard-rows">
                    <button class="keyboard-keys">a</button>
                    <button class="keyboard-keys">s</button>
                    <button class="keyboard-keys">d</button>
                    <button class="keyboard-keys">f</button>
                    <button class="keyboard-keys">g</button>
                    <button class="keyboard-keys">h</button>
                    <button class="keyboard-keys">j</button>
                    <button class="keyboard-keys">k</button>
                    <button class="keyboard-keys">l</button>
                    <button class="keyboard-keys action-keys" id="keyboard-search">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="#c8a96e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="7"/>
                            <line x1="16.5" y1="16.5" x2="22" y2="22"/>
                        </svg>
                        Search
                    </button>
                </span>

                <span class="keyboard-rows">
                    <button class="keyboard-keys">z</button>
                    <button class="keyboard-keys">x</button>
                    <button class="keyboard-keys">c</button>
                    <button class="keyboard-keys">v</button>
                    <button class="keyboard-keys">b</button>
                    <button class="keyboard-keys">n</button>
                    <button class="keyboard-keys">m</button>
                    <button class="keyboard-keys">'</button>
                </span>

                <span class="keyboard-rows">
                    <button class="keyboard-keys space-key">Space</button>
                </span>
            </div>
        </div>
    </div>

    <script src="/js/map-view.js?v=1"></script>
</body>
</html>
