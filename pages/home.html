<!DOCTYPE html>
<html lang="en">
<head>
    <title>Kapeng Barako</title>
    <link rel="stylesheet" href="/css/home.css?v=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-overlay"></div>

    <div id="home-content">
        <div id="avatar-container">
            <img src="/mascot/mascot.png" id="avatar"/>
        </div>

        <div id="right-panel">
            <div id="tagline-container">
                <span class="tagline-eyebrow">Lipa City Hall</span>
                <h1 id="tagline">You need any help?</h1>
                <div class="tagline-line"></div>
            </div>

            <div id="search-container">
                <div id="searchbox">
                    <input type="text" id="search-input" autocomplete="off"/>
                    <button id="clear-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                    <button id="search-icon-left">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                            stroke="#ffffff" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="7"/>
                            <line x1="16.5" y1="16.5" x2="22" y2="22"/>
                        </svg>
                        </button>
                    <ul id="autocomplete-list"></ul>
                </div>
            </div>

            <div id="action-container">
                <button id="browse-all-departments">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                    </svg>
                    View All Services
                </button>
            </div>
        </div>
    </div>

    
    <nav id="bottom-nav">
        <div class="nav-topline"></div>
        <div class="nav-bar">
            <div class="nav-divider"></div>

            <button class="nav-item" onclick='window.location.href="/pages/frequently-visited.html"'>
                <div class="nav-indicator"></div>
                <div class="nav-icon-wrap">
                   <img class= "graph" src="/assets/icons/graph.svg" alt="">
                </div>
                <span class="nav-label">Frequently Visited</span>
            </button>

            <div class="nav-divider"></div>

            <button class="nav-item" onclick='window.location.href="/pages/scannable-documents.html"'>
                <div class="nav-indicator"></div>
                <div class="nav-icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                </div>
                <span class="nav-label">Scanable Documents</span>
            </button>

            <div class="nav-divider"></div>

            <button class="nav-item" onclick='window.location.href="/pages/contacts.html"'>
                <div class="nav-indicator"></div>
                <div class="nav-icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
                        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
                    </svg>
                </div>
                <span class="nav-label">Contacts</span>
            </button>

            <div class="nav-divider"></div>

            <button class="nav-item" onclick='window.location.href="/pages/map-view.html"'>
                <div class="nav-indicator"></div>
                <div class="nav-icon-wrap">
                    <svg viewBox="0 -960 960 960" width="26" height="26" fill="currentColor">
                        <path d="m600-120-240-84-186 72q-20 8-37-4.5T120-170v-560q0-13 7.5-23t20.5-15l212-72 240 84 186-72q20-8 37 4.5t17 33.5v560q0 13-7.5 23T812-192l-212 72Zm-40-98v-468l-160-56v468l160 56Zm80 0 120-40v-474l-120 46v468Zm-440-10 120-46v-468l-120 40v474Zm440-458v468-468Zm-320-56v468-468Z"/>
                    </svg>
                </div>
                <span class="nav-label">Map</span>
            </button>
        </div>
      
        <div class="nav-city-strip">
            <div class="nav-city-dot"></div>
            <span class="nav-city-text">Lipa City Hall</span>
            <div class="nav-city-dot"></div>
        </div>
    </nav>

    <div class="main-keyboard-container">
        <div class="keyboard-container">
            <!-- Row 1 -->
            <div class="keyboard-container">

    <span class="keyboard-rows">
        <button class="keyboard-keys">q</button>
        <button class="keyboard-keys">w</button>
        <button class="keyboard-keys">e</button>
        <button class="keyboard-keys">r</button>
        <button class="keyboard-keys">t</button>
        <button class="keyboard-keys">y</button>
        <button class="keyboard-keys">u</button>
        <button class="keyboard-keys">i</button>
        <button class="keyboard-keys">o</button>
        <button class="keyboard-keys">p</button>
        <button class="keyboard-keys action-keys">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="#c8a96e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
                <line x1="18" y1="9" x2="12" y2="15"/>
                <line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
            Del
        </button>
    </span>

    <span class="keyboard-rows">
        <button class="keyboard-keys">a</button>
        <button class="keyboard-keys">s</button>
        <button class="keyboard-keys">d</button>
        <button class="keyboard-keys">f</button>
        <button class="keyboard-keys">g</button>
        <button class="keyboard-keys">h</button>
        <button class="keyboard-keys">j</button>
        <button class="keyboard-keys">k</button>
        <button class="keyboard-keys">l</button>
        <button class="keyboard-keys action-keys" id="keyboard-search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="#c8a96e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
            </svg>
            Search
        </button>
    </span>

    <span class="keyboard-rows">
        <button class="keyboard-keys">z</button>
        <button class="keyboard-keys">x</button>
        <button class="keyboard-keys">c</button>
        <button class="keyboard-keys">v</button>
        <button class="keyboard-keys">b</button>
        <button class="keyboard-keys">n</button>
        <button class="keyboard-keys">m</button>
        <button class="keyboard-keys">'</button>
    </span>

    <span class="keyboard-rows">
        <button class="keyboard-keys space-key">Space</button>
    </span>

</div>
    </div>

    <script src="/js/home.js?v=1" defer></script>
</body>
</html>
