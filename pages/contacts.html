<!DOCTYPE html>
<html lang="en">
<head>
    <title>Department Views</title>
    <link rel="stylesheet" href="/css/all-services.css">
    <link rel="stylesheet" href="/css/contacts.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="bg-grid"></div>

    <nav id="navigation-bar">
        <img src="/assets/icons/cityhall_logo.png" alt="Lipa City Hall Logo"/>
        <div class="nav-title-block">
            <span class="nav-eyebrow">City of Lipa</span>
            <h2>CONTACTS OF THE LIPA CITY HALL</h2>
        </div>
    </nav>

    <div id="main-content">
        <div id="blur-filter"></div>
        <div id="content">

            <div class="top-bar">
                <img id="back-button" src="/assets/foreground/arrow_back.svg" alt="Back">
                <span class="top-bar-label">CONTACTS</span>
            </div>

            <div class="carousel">
                <div class="group">
                    <div class="card">
                        <div class="service-image">
                            <img src="/assets/GOV_pic_EDITED/Eric.jpg" alt="">
                        </div>
                        <h3>Hon. Eric B. Africa | City Mayor</h3>
                        <p>(043) 779 8490 local 224-225</p>
                    </div>
                </div>
            </div>

            <div class="scroll-hint">
                <span class="hint-arrow">&#8592;</span>
                <span class="hint-text">Swipe to browse departments</span>
                <span class="hint-arrow">&#8594;</span>
            </div>

        </div>
    </div>

    <script src="/js/all-services.js" defer></script>
</body>
</html>
