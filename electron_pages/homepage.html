<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Editor</title>
    <link rel="stylesheet" href="../electron_css/homepage.css">
</head>
<body>

<main class="main">

    <!-- Sidebar -->
    <div class="tools-section">
        <div class="sidebar-top">

            <div class="app-logo">
                <span class="app-logo-text">DE</span>
            </div>

            <div class="tool active" id="files" title="Files">
                <img src="../electron_assets/icons/files_active.svg" alt="Files">
                <span class="tool-label">Files</span>
            </div>

            <div class="tool" id="settings" title="Settings">
                <img src="../electron_assets/icons/settings_inactive.svg" alt="Settings">
                <span class="tool-label">Settings</span>
            </div>

        </div>
        <div class="sidebar-bottom">
            <button class="logout-btn" title="Logout">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Log out</span>
            </button>
        </div>
    </div>

    <!-- Files Panel -->
    <div class="tool-display show" id="files-display">
        <div class="panel-header">
            <div class="panel-title">Files</div>
            <div class="panel-subtitle">Browse and manage documents</div>
        </div>
        <div class="panel-body">
            <div class="file-list-label">Documents</div>
            <div id="file-list" class="file-list"></div>
        </div>
        <div class="resize-handle"></div>
    </div>

    <!-- Settings Panel -->
    <div class="tool-display" id="settings-display">
        <div class="panel-header">
            <div class="panel-title">Settings</div>
            <div class="panel-subtitle">Application preferences</div>
        </div>
        <div class="panel-body">
            <div class="path-section">
                <label class="input-label">JSON Folder Path</label>
                <div class="path-row">
                    <input type="text" id="jsonPathInput" placeholder="C:/path/to/json/files" class="path-input"/>
                    <button id="browseBtn" class="btn-icon-only" title="Browse">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                    </button>
                </div>
                <button id="savePathBtn" class="btn-primary">Load Files</button>
            </div>
        </div>
        <div class="resize-handle"></div>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <div class="content-placeholder">
            <div class="placeholder-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
            </div>
            <div class="placeholder-title">No file open</div>
            <div class="placeholder-sub">Select a file from the panel to begin</div>
        </div>
    </div>

</main>

<script src="../electron_js/homepage.js"></script>
</body>
</html>
