<!DOCTYPE html>
<html>

<body>
    <h3>Loading Content...</h3>
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            let savedDate = JSON.parse(localStorage.getItem("last-date"));
            let currentDate = new Date();

            console.log("Saved:", savedDate);
            console.log("Current:", currentDate);

            // ✅ Check if date exists
            if (savedDate) {
                let lastVisit = new Date(savedDate);

                // ✅ Compare only the day (ignore time)
                if (lastVisit.toDateString() !== currentDate.toDateString()) {
                    console.log("New day detected → clearing visitors data");

                    // 🧹 Delete visitor data
                    localStorage.removeItem("visitors");
                }
            }

            // ✅ Always update last-date to today
            localStorage.setItem("last-date", JSON.stringify(currentDate));


            function updateTotalVisitor(visited) {

                if (!data) {
